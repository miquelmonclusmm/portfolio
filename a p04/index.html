<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzeria Bambini</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- JAVASCRIPT -->
    <script src="js/main.js" defer></script>

     <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jersey+25&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div id="header-esq">
            <h1>PIZZERIA BAMBINI</h1>
        </div>
        <div class="carrito" id="boto-carrito">
            <img src="img/carrito.svg" alt="Carrito">
            <span id="total">0,00€</span>
        </div>
    </header>

    <main>
        <div id="vista-carta">
            <nav class="filtres">
                <button data-categoria="tots" class="active">Tots</button>
                <button data-categoria="aperitivi">Aperitivi</button> 
                <button data-categoria="pizze">Pizze</button>
                <button data-categoria="pasta">Pasta</button>
                <button data-categoria="dolci">Dolci</button>
            </nav>
            
            <div id="menu-container"></div>
        </div>

        <div id="vista-confirmacio" class="hidden">
            <a href="#" id="btn-tornar" class="enllaç-tornar">Tornar a la carta</a>
            
            <h2>Resum de la teva comanda</h2>
            <hr>
            
            <div id="llista-resum"></div>
            <div id="total-final">Total: 0,00€</div>

            <section class="formulari-seccio">
                <form id="formulari-comanda">
                    <div class="form-group">
                        <label for="nom">El teu nom:</label>
                        <input type="text" id="nom" required placeholder="Ex: Marc">
                    </div>
                    <div class="form-group">
                        <label for="observacions">Observacions:</label>
                        <textarea id="observacions" placeholder="Al·lèrgies o detalls..."></textarea>
                    </div>
                    <button type="submit" class="btn-confirmar">CONFIRMAR I ENVIAR POSICIÓ</button>
                </form>
            </section>
        </div>
    </main>
<footer>
    <div class="footer-content">
        <p>&copy; 2026 Pizzeria Bambini - Cuina italiana artesana</p>
        <p>Terrassa, Catalunya | Obert de 13:00 a 23:00</p>
    </div>
</footer>
</body>
</html>
